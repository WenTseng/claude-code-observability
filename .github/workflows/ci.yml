name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pymongo anthropic ruff pytest

      - name: Lint
        run: ruff check backend/ tools/

      - name: Test
        run: pytest backend/tests/ -v

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose up -d --wait || docker compose up -d

      - name: Check collector is running
        run: docker compose ps | grep otelcol
